name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "bitscrape @ git+https://github.com/Sudharsansm/Bitscrape.git"
          pip install -e ".[dev]" --no-deps
          pip install pydantic pydantic-settings click pytest pytest-asyncio ruff
      - name: Run tests
        run: pytest -v
      - name: Lint
        run: ruff check bie tests